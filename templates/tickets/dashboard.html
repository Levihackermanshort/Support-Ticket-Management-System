{% extends 'base.html' %}

{% block content %}
<h1>Dashboard</h1>
<div class="row">
  <div class="col-md-3"><div class="card p-3">Total Tickets: {{ total }}</div></div>
  <div class="col-md-3"><div class="card p-3">Open: {{ open_count }}</div></div>
  <div class="col-md-3"><div class="card p-3">Resolved: {{ resolved }}</div></div>
  <div class="col-md-3"><div class="card p-3">High Priority: {{ high_priority }}</div></div>
</div>
{% endblock %}
